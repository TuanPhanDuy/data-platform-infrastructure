# ArgoCD Application for the data-platform Helm chart — PROD. Same pull-based GitOps model as
# app-data-platform-dev.yaml (see ../docs/HLD.md): ArgoCD reconciles the cluster to match this
# repo, nothing else ever runs kubectl/helm against it.
#
# Tracks values.yaml + values-prod.yaml. Watches the same `main` branch as dev/staging —
# promotion here is NOT a different git ref, it's that values-prod.yaml pins every
# services.*.image.tag explicitly (see that file) and services.cube.enabled: false (this example
# targets Cube Cloud, not the in-cluster Cube values.yaml/staging track). Someone deliberately
# bumping one of those pinned tags in a reviewed PR — after it has proven itself in staging via
# app-data-platform-staging.yaml — is what promotes a change to prod.
#
# `project: default` for now, matching the other two Applications; a real prod deployment should
# register this under a dedicated ArgoCD AppProject with tighter RBAC (restricted repo/destination
# allow-list, required manual approval for source repo changes) — not created here, out of scope
# of this chart.
#
# Bootstrap (once ArgoCD itself is installed in the cluster):
#   kubectl apply -f argocd/app-data-platform-prod.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TuanPhanDuy/data-platform-infrastructure.git
    targetRevision: main
    path: helm/data-platform
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    # Point at the real prod cluster's API server once one exists — out of scope of this repo,
    # see docs/HLD.md's non-goals on multi-cluster topologies.
    server: https://kubernetes.default.svc
    namespace: data-platform
  syncPolicy:
    automated:
      prune: true      # remove resources this repo no longer declares
      selfHeal: true    # revert manual cluster drift back to what git says — see HLD.md D6:
                         # the recovery path for a bad prod change is `git revert`, not a manual fix
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
