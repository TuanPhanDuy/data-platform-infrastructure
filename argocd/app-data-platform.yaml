# ArgoCD Application for the data-platform Helm chart. Pull-based GitOps: ArgoCD watches this
# repo and reconciles the cluster to match it — nothing (including cube-semantic-demo's CI)
# ever runs kubectl/helm against the cluster directly. See ../docs/HLD.md.
#
# This is the DEV/local instance (values.yaml + values-dev.yaml, targets a kind cluster). For a
# real prod ArgoCD project: copy this file, drop values-dev.yaml for values-prod.yaml, point
# `destination` at the prod cluster/namespace, and register it under a non-"default" ArgoCD
# Project with tighter RBAC.
#
# Bootstrap (once ArgoCD itself is installed in the cluster):
#   kubectl apply -f argocd/app-data-platform.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TuanPhanDuy/data-platform-infrastructure.git
    targetRevision: main
    path: helm/data-platform
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: data-platform
  syncPolicy:
    automated:
      prune: true      # remove resources this repo no longer declares
      selfHeal: true    # revert manual cluster drift back to what git says
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
