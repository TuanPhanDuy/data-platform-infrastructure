# ArgoCD Application for the data-platform Helm chart. Pull-based GitOps: ArgoCD watches this
# repo and reconciles the cluster to match it — nothing (including cube-semantic's CI)
# ever runs kubectl/helm against the cluster directly. See ../docs/HLD.md.
#
# This is the DEV/local instance (values.yaml + values-dev.yaml, targets a kind cluster). See
# the sibling app-data-platform-staging.yaml and app-data-platform-prod.yaml for the other SDLC
# stages — same chart, different values overlay + destination + (for prod) tighter project RBAC.
#
# Bootstrap (once ArgoCD itself is installed in the cluster):
#   kubectl apply -f argocd/app-data-platform-dev.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TuanPhanDuy/data-platform-infrastructure.git
    targetRevision: main
    path: helm/data-platform
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: data-platform
  syncPolicy:
    automated:
      prune: true      # remove resources this repo no longer declares
      selfHeal: true    # revert manual cluster drift back to what git says
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
