{{- if .Values.infra.postgresql.enabled }}
{{- /* DEV-ONLY single-replica PostgreSQL for iam-service (and, when superset.enabled, a second
       "superset" database on this same instance/role — see templates/superset-deployment.yaml).
       Use managed Postgres in prod. */ -}}
{{- if .Values.superset.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-postgresql-initdb
  labels:
    {{- include "dp.commonLabels" . | nindent 4 }}
data:
  01-superset-db.sql: |
    CREATE DATABASE {{ .Values.superset.metadataDb.database }};
---
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgresql
  labels:
    {{- include "dp.commonLabels" . | nindent 4 }}
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  serviceName: {{ .Release.Name }}-postgresql
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgresql
          image: {{ .Values.infra.postgresql.image }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.infra.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.infra.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dp.secretName" . }}
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.infra.postgresql.username | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.infra.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.superset.enabled }}
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            {{- end }}
  {{- if .Values.infra.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.infra.postgresql.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.infra.postgresql.persistence.size }}
  {{- end }}
{{- if or (not .Values.infra.postgresql.persistence.enabled) .Values.superset.enabled }}
      volumes:
        {{- if not .Values.infra.postgresql.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.superset.enabled }}
        - name: initdb
          configMap:
            name: {{ .Release.Name }}-postgresql-initdb
        {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgresql
  labels:
    {{- include "dp.commonLabels" . | nindent 4 }}
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
