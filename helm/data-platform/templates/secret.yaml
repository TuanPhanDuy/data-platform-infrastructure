{{- if .Values.appSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dp.secretName" . }}
  labels:
    {{- include "dp.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.appSecret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
