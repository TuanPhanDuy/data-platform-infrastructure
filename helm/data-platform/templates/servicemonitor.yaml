{{- if .Values.observability.serviceMonitor.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (dig "metrics" "enabled" false $svc) }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "dp.resourceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "dp.commonLabels" $ | nindent 4 }}
    {{- with $.Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "dp.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
  endpoints:
    - port: http
      path: {{ dig "metrics" "path" "/actuator/prometheus" $svc | quote }}
      interval: {{ $.Values.observability.serviceMonitor.interval | default "15s" }}
{{- end }}
{{- end }}
{{- end }}
