{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dp.resourceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "dp.commonLabels" $ | nindent 4 }}
    {{- include "dp.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dp.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
    {{- range $svc.extraPorts }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
    {{- end }}
{{- end }}
{{- end }}
