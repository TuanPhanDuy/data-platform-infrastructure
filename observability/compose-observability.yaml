# Shared observability stack for the whole data-platform: OpenTelemetry
# Collector (traces), Prometheus (metrics), Tempo (trace store), Loki + Promtail
# (logs), Grafana (dashboards + trace/log correlation).
#
#   docker compose -f observability/compose-observability.yaml up -d
#
# Then run the services on the host and open Grafana at http://localhost:3000.
# See README.md for how to point the apps at the collector and ship their logs.
name: data-platform-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (apps export traces here)
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.7.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.4.1
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.1
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/var/log/data-platform:ro   # host-run apps write JSON logs here
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3.1.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"     # 9090 may be taken; Grafana reaches it in-network on 9090
    extra_hosts:
      - "host.docker.internal:host-gateway"   # scrape apps running on the host

  grafana:
    image: grafana/grafana:11.5.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  tempo-data:
  loki-data:
