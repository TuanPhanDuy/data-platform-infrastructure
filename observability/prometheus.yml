# Prometheus scrape config for the data-platform services.
# The Java services run on the host (java -jar), so they are reached via
# host.docker.internal. In Kubernetes, Prometheus discovers pods by the
# prometheus.io/scrape annotations set in the Helm chart instead.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: semantic-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels: { service: semantic-service }

  - job_name: chat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels: { service: chat-service }

  - job_name: iam-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]
        labels: { service: iam-service }

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]   # collector self-metrics
